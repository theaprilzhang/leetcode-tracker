name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # Adjust branch if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for web
        run: npx expo export --platform web

      - name: Move dist to docs
        run: mv dist docs

      - name: Fix Expo's double assets directory issue
        run: |
          # Fix the docs/assets/assets nested directory issue from Expo export
          if [ -d "docs/assets/assets" ]; then
            mv docs/assets/assets/* docs/assets/ 2>/dev/null || true
            rm -rf docs/assets/assets
          fi

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          # Python script to fix all base tags and paths safely
          python3 << 'PYSCRIPT'
import os
import re

for root, dirs, files in os.walk("docs"):
    for file in files:
        if file.endswith(".html"):
            filepath = os.path.join(root, file)
            with open(filepath, 'r', encoding='utf-8') as f:
                content = f.read()
            
            # Remove ALL base tags first (prevent duplicates)
            content = re.sub(r'<base href="[^"]*">', '', content)
            
            # Add exactly ONE correct base tag
            if '<base href="/leetcode-tracker/">' not in content:
                content = content.replace('<head>', '<head><base href="/leetcode-tracker/">')
            
            # Ensure all asset paths are relative
            content = re.sub(r'url\("/', 'url("./', content)
            content = re.sub(r'href="/', 'href="./', content)
            content = re.sub(r'src="/', 'src="./', content)
            
            # Fix double assets path if any
            content = content.replace('assets/assets', 'assets')
            
            with open(filepath, 'w', encoding='utf-8') as f:
                f.write(content)
PYSCRIPT

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Deploy to GitHub Pages [skip ci]" || echo "No changes to commit"
          git push