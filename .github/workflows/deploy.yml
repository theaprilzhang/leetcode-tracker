name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # Adjust branch if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for web
        run: npx expo export --platform web

      - name: Move dist to docs
        run: mv dist docs

      - name: Fix Expo's double assets directory issue
        run: |
          # Fix the docs/assets/assets nested directory issue from Expo export
          if [ -d "docs/assets/assets" ]; then
            mv docs/assets/assets/* docs/assets/ 2>/dev/null || true
            rm -rf docs/assets/assets
          fi

      - name: Fix asset paths for GitHub Pages subdirectory
        run: python3 .github/fix_paths.py

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Deploy to GitHub Pages [skip ci]" || echo "No changes to commit"
          git push